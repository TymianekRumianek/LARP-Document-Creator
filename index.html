<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Dokumentów Larpowych</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== FONTS ===== */
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap');

/* Custom font slots — deweloper wrzuca pliki do /fonts/ */
/* @font-face { font-family: 'MojaFontCzcionka'; src: url('fonts/moja.ttf'); } */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1f;
  --panel: #21212a;
  --panel2: #292934;
  --border: #3a3a4a;
  --accent: #c0392b;
  --accent2: #8b1a1a;
  --text: #e8e4d9;
  --text-dim: #888899;
  --text-dimmer: #555566;
  --paper: #f5f0e8;
  --paper-dark: #e8e2d4;
  --ink: #1a1a1a;
  --ink-dim: #3a3a3a;
  --stamp-red: #c0392b;
  --stamp-blue: #1a3a6b;
  --radius: 6px;
  --font-ui: 'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ===== TOPBAR ===== */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 48px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}

#topbar h1 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-right: 8px;
}

.top-sep { width: 1px; height: 24px; background: var(--border); }

.top-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-ui);
  white-space: nowrap;
}
.top-btn:hover { background: var(--panel2); border-color: #555566; }
.top-btn.danger { border-color: var(--accent2); color: #e88; }
.top-btn.danger:hover { background: #2a1515; }
.top-btn.primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
.top-btn.primary:hover { background: #a93226; }

.top-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

#font-select {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 12px;
  font-family: var(--font-ui);
  cursor: pointer;
}

/* ===== LAYOUT ===== */
#app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 12px 10px;
}

.sidebar-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-dimmer);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding: 0 2px;
}

/* Template thumbnails */
.template-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.template-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: var(--font-ui);
  width: 100%;
}
.template-btn:hover { border-color: #666677; background: #2d2d3a; }
.template-btn.active { border-color: var(--accent); background: #2a1515; }

.tpl-icon {
  width: 28px; height: 36px;
  background: var(--paper);
  border-radius: 2px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  padding: 3px 2px;
  gap: 2px;
}
.tpl-line { height: 2px; background: #aaa; border-radius: 1px; }
.tpl-line.short { width: 60%; }
.tpl-line.thick { height: 3px; background: #666; }
.tpl-line.gap { margin-top: 2px; }

.tpl-info { display: flex; flex-direction: column; }
.tpl-name { font-size: 12px; font-weight: 600; }
.tpl-desc { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

/* Tool buttons */
.tool-grid {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.tool-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: var(--font-ui);
  font-size: 12px;
  width: 100%;
}
.tool-btn:hover { background: var(--panel2); border-color: var(--border); }
.tool-btn:active { transform: scale(0.97); }

.tool-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

/* Stamp color pickers */
.stamp-row {
  display: flex; gap: 6px; margin-top: 4px;
}
.stamp-opt {
  flex: 1;
  padding: 5px 4px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 3px;
  border: 1px solid;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  font-family: var(--font-ui);
  letter-spacing: 0.05em;
}
.stamp-opt.red { background: #2a1010; border-color: var(--accent); color: #e07070; }
.stamp-opt.blue { background: #0d1a2e; border-color: #2a5ca8; color: #7099e0; }
.stamp-opt.red:hover { background: var(--accent); color: white; }
.stamp-opt.blue:hover { background: #1a3a7a; color: white; }

/* ===== CANVAS AREA ===== */
#canvas-area {
  flex: 1;
  overflow: auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px;
  gap: 0;
}

/* Page shadow effect */
#page-wrapper {
  position: relative;
}

#page-wrapper::before {
  content: '';
  position: absolute;
  inset: -1px;
  background: linear-gradient(135deg, #555 0%, #333 100%);
  border-radius: 2px;
  transform: translate(4px, 4px);
  z-index: 0;
}

/* ===== DOCUMENT / PAPER ===== */
#document {
  position: relative;
  z-index: 1;
  width: 794px; /* A4 at 96dpi */
  min-height: 1123px;
  background: var(--paper);
  color: var(--ink);
  padding: 72px 80px 90px 80px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 13.5px;
  line-height: 1.7;
  outline: none;
  cursor: text;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
}

/* ===== DOCUMENT ELEMENTS ===== */
.doc-header-institution {
  font-family: 'Courier Prime', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-align: left;
  line-height: 1.4;
  margin-bottom: 4px;
}

.doc-title {
  font-family: 'Courier Prime', monospace;
  font-size: 13.5px;
  font-weight: 700;
  text-align: center;
  text-decoration: underline;
  letter-spacing: 0.05em;
  margin: 16px 0;
}

.doc-field-row {
  display: flex;
  align-items: baseline;
  gap: 0;
  margin: 3px 0;
  font-size: 13px;
}

.doc-field-label {
  white-space: nowrap;
  font-weight: 700;
  font-size: 13px;
}

.doc-field-dots {
  flex: 1;
  border-bottom: 1px solid var(--ink);
  min-width: 40px;
  margin: 0 4px;
  height: 18px;
  outline: none;
}

.doc-dots-only {
  display: block;
  border-bottom: 1px solid var(--ink);
  width: 100%;
  height: 22px;
  margin: 6px 0;
  outline: none;
}

.doc-spacer-sm { height: 14px; display: block; }
.doc-spacer-md { height: 28px; display: block; }
.doc-spacer-lg { height: 56px; display: block; }

.doc-hr {
  border: none;
  border-top: 1px solid var(--ink);
  margin: 10px 0;
}

.doc-section-header {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.05em;
  margin: 12px 0 4px 0;
}

.doc-indent-block {
  margin-left: 28px;
  margin-right: 28px;
  margin-top: 6px;
  margin-bottom: 6px;
}

.doc-signature-block {
  display: inline-block;
  min-width: 180px;
  text-align: center;
  margin-top: 8px;
}
.doc-signature-line {
  border-bottom: 1px solid var(--ink);
  width: 100%;
  height: 40px;
  display: block;
  margin-bottom: 2px;
}
.doc-signature-label {
  font-size: 11.5px;
  text-align: center;
  display: block;
}

/* STAMPS */
.doc-stamp {
  display: inline-block;
  border: 3px solid;
  padding: 4px 12px;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.12em;
  transform: rotate(-8deg);
  opacity: 0.85;
  font-family: 'Courier Prime', monospace;
  line-height: 1;
  user-select: none;
  cursor: default;
  position: relative;
}
.doc-stamp.red { color: var(--stamp-red); border-color: var(--stamp-red); }
.doc-stamp.blue { color: var(--stamp-blue); border-color: var(--stamp-blue); }
.doc-stamp-wrap {
  display: block;
  text-align: right;
  margin-bottom: 6px;
}

/* Numbered list */
.doc-numlist {
  padding-left: 20px;
  margin: 6px 0;
}
.doc-numlist li {
  margin: 3px 0;
  font-size: 13px;
  padding-left: 4px;
}

/* Table */
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12.5px;
}
.doc-table td, .doc-table th {
  border: 1px solid var(--ink);
  padding: 4px 8px;
  text-align: left;
  vertical-align: top;
}
.doc-table th {
  font-weight: 700;
  background: rgba(0,0,0,0.04);
}

/* Paragraph */
.doc-para {
  margin: 6px 0;
  text-align: justify;
  font-size: 13.5px;
  line-height: 1.7;
}

/* Sygnatura / metadata */
.doc-meta {
  font-size: 12px;
  margin: 2px 0;
}

/* Selection highlight on paper */
#document *::selection { background: rgba(150, 180, 255, 0.35); }

/* Editable elements get subtle hover */
[contenteditable="true"]:hover {
  outline: 1px dashed rgba(100, 120, 200, 0.3);
  border-radius: 2px;
}
[contenteditable="true"]:focus {
  outline: 1px solid rgba(100, 120, 200, 0.5);
  border-radius: 2px;
}

/* ===== FONT OPTIONS ===== */
.font-courier { font-family: 'Courier Prime', 'Courier New', monospace; }
.font-elite { font-family: 'Special Elite', cursive; }
.font-fell { font-family: 'IM Fell English', serif; }

/* ===== STATUS BAR ===== */
#statusbar {
  height: 26px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 11px;
  color: var(--text-dimmer);
  flex-shrink: 0;
}

#statusbar span b { color: var(--text-dim); }

/* ===== MODAL ===== */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
}
#modal h3 { font-size: 15px; margin-bottom: 8px; }
#modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
#modal .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a5a; }

/* ===== TOOLTIP ===== */
[data-tip] { position: relative; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  left: 100%; top: 50%; transform: translateY(-50%);
  margin-left: 8px;
  background: #111;
  color: #eee;
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  border: 1px solid var(--border);
}
[data-tip]:hover::after { opacity: 1; }

/* Print styles */
@media print {
  body { background: white; overflow: visible; }
  #topbar, #sidebar, #statusbar { display: none; }
  #canvas-area { padding: 0; background: white; display: block; overflow: visible; }
  #page-wrapper { box-shadow: none; }
  #page-wrapper::before { display: none; }
  #document {
    width: 100%; min-height: auto;
    box-shadow: none;
    padding: 20mm 22mm 25mm 22mm;
  }
  [contenteditable]:hover, [contenteditable]:focus { outline: none !important; }
}

/* Highlight removable elements */
.doc-removable {
  position: relative;
  cursor: pointer;
}
.doc-removable:hover::after {
  content: '×';
  position: absolute;
  top: -6px; right: -6px;
  width: 16px; height: 16px;
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  text-align: center;
}

</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <h1>📄 Dokumenty Larpowe</h1>
  <div class="top-sep"></div>

  <select id="font-select" title="Czcionka dokumentu" onchange="changeFont(this.value)">
    <option value="font-courier">Courier Prime (maszynopis)</option>
    <option value="font-elite">Special Elite (stara maszyna)</option>
    <option value="font-fell">IM Fell English (klasyk)</option>
  </select>

  <div class="top-sep"></div>

  <button class="top-btn" onclick="showModal('clear')" title="Wyczyść cały dokument">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    Nowy dokument
  </button>

  <div style="flex:1"></div>

  <button class="top-btn" onclick="exportPNG()" title="Eksportuj jako PNG">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 5-5 5 5"/><circle cx="8.5" cy="13.5" r="1.5"/></svg>
    PNG
  </button>

  <button class="top-btn primary" onclick="exportPDF()" title="Eksportuj jako PDF">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
    PDF
  </button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- TEMPLATES -->
    <div class="sidebar-section">
      <div class="sidebar-title">Szablony</div>
      <div class="template-grid">
        <button class="template-btn active" onclick="loadTemplate('blank')" title="Pusty dokument">
          <div class="tpl-icon">
            <div class="tpl-line short"></div>
          </div>
          <div class="tpl-info">
            <span class="tpl-name">Pusty</span>
            <span class="tpl-desc">Od zera</span>
          </div>
        </button>
        <button class="template-btn" onclick="loadTemplate('pismo')" title="Pismo urzędowe">
          <div class="tpl-icon">
            <div class="tpl-line thick short"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line"></div>
          </div>
          <div class="tpl-info">
            <span class="tpl-name">Pismo</span>
            <span class="tpl-desc">Oficjalny list</span>
          </div>
        </button>
        <button class="template-btn" onclick="loadTemplate('raport')" title="Raport / decyzja">
          <div class="tpl-icon">
            <div class="tpl-line thick"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line short"></div>
          </div>
          <div class="tpl-info">
            <span class="tpl-name">Raport</span>
            <span class="tpl-desc">Decyzja / protokół</span>
          </div>
        </button>
        <button class="template-btn" onclick="loadTemplate('karta')" title="Karta osobowa">
          <div class="tpl-icon">
            <div class="tpl-line thick"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line short"></div>
          </div>
          <div class="tpl-info">
            <span class="tpl-name">Karta osoby</span>
            <span class="tpl-desc">Dane personalne</span>
          </div>
        </button>
        <button class="template-btn" onclick="loadTemplate('wniosek')" title="Wniosek formalny">
          <div class="tpl-icon">
            <div class="tpl-line thick"></div>
            <div class="tpl-line short"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line"></div>
            <div class="tpl-line gap"></div>
            <div class="tpl-line short"></div>
          </div>
          <div class="tpl-info">
            <span class="tpl-name">Wniosek</span>
            <span class="tpl-desc">Podanie / prośba</span>
          </div>
        </button>
      </div>
    </div>

    <!-- NARZĘDZIA WSTAWIANIA -->
    <div class="sidebar-section">
      <div class="sidebar-title">Wstaw element</div>
      <div class="tool-grid">

        <button class="tool-btn" onclick="insertElement('para')" data-tip="Akapit tekstu">
          <span class="tool-icon">¶</span> Akapit tekstu
        </button>

        <button class="tool-btn" onclick="insertElement('title')" data-tip="Tytuł dokumentu">
          <span class="tool-icon">T</span> Tytuł / nagłówek
        </button>

        <button class="tool-btn" onclick="insertElement('header-inst')" data-tip="Nagłówek instytucji">
          <span class="tool-icon">🏛</span> Nagłówek instytucji
        </button>

        <button class="tool-btn" onclick="insertElement('section')" data-tip="Nagłówek sekcji">
          <span class="tool-icon">§</span> Nagłówek sekcji
        </button>

        <button class="tool-btn" onclick="insertElement('meta-row')" data-tip="Wiersz metadanych">
          <span class="tool-icon">≡</span> Wiersz (np. DATA:)
        </button>

        <button class="tool-btn" onclick="insertElement('field')" data-tip="Pole z etykietą i linią">
          <span class="tool-icon">_</span> Pole do wypełnienia
        </button>

        <button class="tool-btn" onclick="insertElement('dots-only')" data-tip="Sama linia do podpisu/wpisu">
          <span class="tool-icon">⋯</span> Linia pusta
        </button>

        <button class="tool-btn" onclick="insertElement('indent')" data-tip="Wcięty blok tekstu">
          <span class="tool-icon">❝</span> Blok z wcięciem
        </button>

        <button class="tool-btn" onclick="insertElement('numlist')" data-tip="Lista numerowana">
          <span class="tool-icon">1.</span> Lista numerowana
        </button>

        <button class="tool-btn" onclick="insertElement('table2')" data-tip="Tabela 2-kolumnowa">
          <span class="tool-icon">⊞</span> Tabela 2-kolumny
        </button>

        <button class="tool-btn" onclick="insertElement('table3')" data-tip="Tabela 3-kolumnowa">
          <span class="tool-icon">⊟</span> Tabela 3-kolumny
        </button>

        <button class="tool-btn" onclick="insertElement('hr')" data-tip="Linia pozioma">
          <span class="tool-icon">—</span> Linia pozioma
        </button>

        <button class="tool-btn" onclick="insertElement('spacer-sm')" data-tip="Mały odstęp">
          <span class="tool-icon">↕</span> Odstęp mały
        </button>

        <button class="tool-btn" onclick="insertElement('spacer-md')" data-tip="Średni odstęp">
          <span class="tool-icon">↕</span> Odstęp średni
        </button>

        <button class="tool-btn" onclick="insertElement('spacer-lg')" data-tip="Duży odstęp (miejsce na podpis)">
          <span class="tool-icon">↕</span> Odstęp duży
        </button>

// ===== STATE =====
let currentFont = 'font-courier';
let currentTemplate = 'blank';
let pendingModalAction = null;

// ===== INIT =====
function init() {
  loadTemplate('blank');
}

// ===== TEMPLATE LOADING =====
function loadTemplate(name, force = false) {
  if (!force) {
    const doc = document.getElementById('document');
    const isEmpty = doc.innerText.trim().length < 2;
    if (!isEmpty && name !== currentTemplate) {
      showModal('template', name);
      return;
    }
  }

  currentTemplate = name;
  const doc = document.getElementById('document');
  doc.innerHTML = TEMPLATES[name] || TEMPLATES.blank;
  doc.className = 'font-' + currentFont.replace('font-','');
  doc.className = currentFont;

  // Mark active template button
  document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
  const idx = ['blank','pismo','raport','karta','wniosek'].indexOf(name);
  if (idx >= 0) document.querySelectorAll('.template-btn')[idx].classList.add('active');

  updateStatus();
  doc.focus();
}

// ===== INSERT ELEMENTS =====
function insertElement(type) {
  const html = ELEMENTS[type];
  if (!html) return;

  const doc = document.getElementById('document');
  const sel = window.getSelection();
  let inserted = false;

  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    // Check if selection is inside our document
    if (doc.contains(range.commonAncestorContainer)) {
      // Find the top-level child of doc that contains the cursor
      let node = range.commonAncestorContainer;
      while (node.parentElement && node.parentElement !== doc) {
        node = node.parentElement;
      }
      if (node.parentElement === doc) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        // Insert all children after the current node
        const frag = document.createDocumentFragment();
        while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);
        node.after(frag);
        inserted = true;
      }
    }
  }

  if (!inserted) {
    doc.insertAdjacentHTML('beforeend', html);
  }

  updateStatus();
  doc.focus();
}

// ===== STAMPS =====
function insertStamp(text, color) {
  const html = `<div class="doc-stamp-wrap"><span class="doc-stamp ${color}" contenteditable="false">${text}</span></div>`;
  const doc = document.getElementById('document');
  const sel = window.getSelection();
  let inserted = false;

  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    if (doc.contains(range.commonAncestorContainer)) {
      let node = range.commonAncestorContainer;
      while (node.parentElement && node.parentElement !== doc) node = node.parentElement;
      if (node.parentElement === doc) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        node.before(wrapper.firstChild);
        inserted = true;
      }
    }
  }
  if (!inserted) doc.insertAdjacentHTML('afterbegin', html);
  updateStatus();
}

function promptCustomStamp() {
  const text = prompt('Tekst stempla (np. DO RĄK WŁASNYCH):');
  if (!text) return;
  const colorChoice = confirm('Czerwony? (OK = czerwony, Anuluj = niebieski)');
  insertStamp(text.toUpperCase(), colorChoice ? 'red' : 'blue');
}

// ===== FONT =====
function changeFont(val) {
  currentFont = val;
  const doc = document.getElementById('document');
  doc.className = val;
}

// ===== STATUS BAR =====
function updateStatus() {
  const doc = document.getElementById('document');
  const text = doc.innerText || '';
  document.getElementById('stat-chars').textContent = text.length;
  document.getElementById('stat-words').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
}

// ===== MODAL =====
function showModal(type, data) {
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const btn = document.getElementById('modal-confirm-btn');

  if (type === 'clear') {
    title.textContent = 'Nowy dokument';
    body.textContent = 'Czy na pewno chcesz wyczyścić cały dokument? Tej operacji nie można cofnąć.';
    btn.textContent = 'Wyczyść';
    btn.onclick = () => { loadTemplate('blank', true); closeModal(); };
  } else if (type === 'template') {
    title.textContent = 'Załadować szablon?';
    body.textContent = 'Dokument zawiera już treść. Załadowanie szablonu zastąpi całą zawartość. Czy kontynuować?';
    btn.textContent = 'Załaduj';
    btn.onclick = () => { loadTemplate(data, true); closeModal(); };
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== EXPORT PNG =====
async function exportPNG() {
  const btn = event.target.closest('button');
  btn.textContent = '⏳ Generuję...';
  btn.disabled = true;

  // Temporarily remove contenteditable outlines
  const doc = document.getElementById('document');
  doc.setAttribute('data-exporting', '1');

  try {
    const canvas = await html2canvas(document.getElementById('document'), {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f5f0e8',
      logging: false,
      width: doc.offsetWidth,
      height: doc.offsetHeight,
    });

    const link = document.createElement('a');
    link.download = 'dokument-larp.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Błąd eksportu: ' + e.message);
  } finally {
    doc.removeAttribute('data-exporting');
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 5-5 5 5"/><circle cx="8.5" cy="13.5" r="1.5"/></svg> PNG`;
  }
}

// ===== EXPORT PDF =====
async function exportPDF() {
  const btn = event.target.closest('button');
  const origHTML = btn.innerHTML;
  btn.textContent = '⏳ Generuję...';
  btn.disabled = true;

  const doc = document.getElementById('document');

  try {
    const canvas = await html2canvas(doc, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f5f0e8',
      logging: false,
      width: doc.offsetWidth,
      height: doc.offsetHeight,
    });

    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    // A4 = 210mm x 297mm
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();

    // Scale image to fit width
    const imgW = canvas.width;
    const imgH = canvas.height;
    const ratio = imgW / imgH;
    const pageRatio = pdfW / pdfH;

    let drawW = pdfW;
    let drawH = pdfW / ratio;

    // If content taller than one page, scale down to fit
    if (drawH > pdfH) {
      drawH = pdfH;
      drawW = pdfH * ratio;
    }

    pdf.addImage(imgData, 'JPEG', (pdfW - drawW) / 2, 0, drawW, drawH);
    pdf.save('dokument-larp.pdf');
  } catch(e) {
    alert('Błąd eksportu PDF: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHTML;
  }
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'p') {
      e.preventDefault();
      exportPDF();
    }
  }
  if (e.key === 'Escape') closeModal();
});

// ===== PREVENT default drag on stamps =====
document.getElementById('document').addEventListener('dragstart', function(e) {
  if (e.target.classList && e.target.classList.contains('doc-stamp')) {
    e.preventDefault();
  }
});

// ===== START =====
init();
