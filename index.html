<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Dokumentów Larpowych</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/*
  CZCIONKI — INSTRUKCJA DLA DEWELOPERA:
  1. Wrzuć pliki .ttf / .woff2 do folderu /fonts/
  2. Dodaj @font-face poniżej, np:
     @font-face { font-family: 'MojaFontCzcionka'; src: url('fonts/moja.ttf'); }
  3. Dodaj opcję do tablicy CUSTOM_FONTS w JS (na dole pliku)

  STEMPLE OBRAZKOWE — INSTRUKCJA:
  1. Wrzuć pliki .png do folderu /assets/
  2. Nazwy plików = nazwy stempli, np: tajne.png, kopia.png
  3. Dodaj nazwy do tablicy ASSET_STAMPS w JS (na dole pliku)
*/

/* Google Fonts — działają online. Offline: zastąp własnymi @font-face */
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=UnifrakturMaguntia&display=swap');

/* Własne fonty dewelopera: */
/* @font-face { font-family: 'MojaFontCzcionka'; src: url('fonts/moja.ttf'); } */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #16161d;
  --panel: #1e1e28;
  --panel2: #26262f;
  --border: #35354a;
  --border2: #45455a;
  --accent: #c0392b;
  --accent2: #8b1a1a;
  --text: #ddd8cc;
  --text-dim: #80809a;
  --text-dimmer: #50505f;
  --paper: #f4efe5;
  --ink: #111111;
  --stamp-red: #b52020;
  --stamp-blue: #1a3a6b;
  --radius: 5px;
  --ui: 'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--ui); }
body { display: flex; flex-direction: column; }

/* ===================== TOPBAR ===================== */
#topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 44px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 100; flex-wrap: wrap;
}
#topbar-title {
  font-size: 12px; font-weight: 700; letter-spacing: .06em;
  color: var(--text-dim); text-transform: uppercase; margin-right: 4px; white-space: nowrap;
}
.tsep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

/* Top buttons */
.tbtn {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent; color: var(--text);
  font-size: 12px; cursor: pointer; transition: all .12s; font-family: var(--ui);
  white-space: nowrap; height: 28px;
}
.tbtn:hover { background: var(--panel2); border-color: var(--border2); }
.tbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.tbtn.primary:hover { background: #a02020; }
.tbtn svg { width: 13px; height: 13px; flex-shrink: 0; }

/* Format toolbar */
#fmt-bar {
  display: flex; align-items: center; gap: 2px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 4px 12px; height: 36px; flex-shrink: 0; flex-wrap: wrap;
}
.fbtn {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; border: 1px solid transparent; background: transparent;
  color: var(--text); cursor: pointer; font-family: var(--ui); font-size: 13px;
  transition: all .1s; flex-shrink: 0;
}
.fbtn:hover { background: var(--panel2); border-color: var(--border); }
.fbtn.active { background: var(--panel2); border-color: var(--border2); color: #fff; }
.fbtn-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }

#fmt-fontname {
  background: var(--panel2); border: 1px solid var(--border); color: var(--text);
  padding: 2px 6px; border-radius: var(--radius); font-size: 12px; font-family: var(--ui);
  cursor: pointer; height: 26px; max-width: 160px;
}
#fmt-fontsize {
  background: var(--panel2); border: 1px solid var(--border); color: var(--text);
  padding: 2px 4px; border-radius: var(--radius); font-size: 12px; font-family: var(--ui);
  cursor: pointer; height: 26px; width: 56px;
}
#fmt-color {
  width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 4px;
  padding: 2px; background: transparent; cursor: pointer;
}

/* ===================== LAYOUT ===================== */
#app { display: flex; flex: 1; overflow: hidden; }

/* ===================== SIDEBAR ===================== */
#sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
}
.ss { border-bottom: 1px solid var(--border); padding: 10px 8px; }
.ss-title {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--text-dimmer);
  text-transform: uppercase; margin-bottom: 7px; padding: 0 2px;
}

/* Templates */
.tpl-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 8px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--panel2);
  color: var(--text); cursor: pointer; transition: all .12s;
  text-align: left; font-family: var(--ui); width: 100%; margin-bottom: 4px;
}
.tpl-btn:hover { border-color: var(--border2); background: #2a2a35; }
.tpl-btn.active { border-color: var(--accent); background: #2a1010; }
.tpl-thumb {
  width: 24px; height: 32px; background: var(--paper); border-radius: 2px;
  flex-shrink: 0; display: flex; flex-direction: column; padding: 3px 2px; gap: 2px;
}
.tl { height: 2px; background: #aaa; border-radius: 1px; }
.tl.w60 { width: 60%; }
.tl.h3 { height: 3px; background: #777; }
.tl.mt { margin-top: 2px; }
.tpl-info { display: flex; flex-direction: column; }
.tpl-name { font-size: 12px; font-weight: 600; }
.tpl-desc { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

/* Tool items — DRAGGABLE */
.tool-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 8px; border-radius: var(--radius);
  border: 1px solid transparent; background: transparent;
  color: var(--text); cursor: grab; transition: all .12s;
  font-family: var(--ui); font-size: 12px; width: 100%; user-select: none;
}
.tool-item:hover { background: var(--panel2); border-color: var(--border); }
.tool-item:active { cursor: grabbing; }
.tool-item.dragging { opacity: .4; }
.ti { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }

/* Stamp items */
.stamp-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px; border-radius: var(--radius);
  border: 1px solid transparent; background: transparent;
  color: var(--text); cursor: grab; transition: all .12s;
  font-family: var(--ui); font-size: 11px; width: 100%; user-select: none; margin-bottom: 3px;
}
.stamp-item:hover { background: var(--panel2); border-color: var(--border); }
.stamp-preview {
  font-size: 10px; font-weight: 900; border: 2px solid; padding: 1px 5px;
  border-radius: 2px; transform: rotate(-6deg); line-height: 1; white-space: nowrap;
}
.stamp-preview.red { color: var(--stamp-red); border-color: var(--stamp-red); }
.stamp-preview.blue { color: var(--stamp-blue); border-color: var(--stamp-blue); }
.stamp-preview.img { border: none; transform: none; font-size: 18px; }

/* Custom stamp button */
.add-stamp-btn {
  width: 100%; padding: 5px 8px; font-size: 11px; color: var(--text-dim);
  background: transparent; border: 1px dashed var(--border); border-radius: var(--radius);
  cursor: pointer; font-family: var(--ui); text-align: center; margin-top: 4px;
  transition: all .12s;
}
.add-stamp-btn:hover { border-color: var(--border2); color: var(--text); background: var(--panel2); }

/* ===================== DROP INDICATOR ===================== */
.drop-line {
  height: 3px; background: #4466ff; border-radius: 2px;
  margin: 0; pointer-events: none;
  box-shadow: 0 0 6px #4466ff88;
}

/* ===================== CANVAS ===================== */
#canvas-area {
  flex: 1; overflow: auto; background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 20px;
}
#page-wrapper { position: relative; }
#page-wrapper::before {
  content: ''; position: absolute; inset: -1px;
  background: #2a2a2a; border-radius: 2px;
  transform: translate(5px, 5px); z-index: 0;
}

/* ===================== DOCUMENT ===================== */
#document {
  position: relative; z-index: 1;
  width: 794px; min-height: 1123px;
  background: var(--paper); color: var(--ink);
  padding: 72px 80px 90px 80px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 13.5px; line-height: 1.7;
  outline: none;
  box-shadow: 0 0 0 1px rgba(0,0,0,.4);
}

/* Document element styles */
.doc-inst { font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: .07em; line-height: 1.4; margin-bottom: 4px; }
.doc-title { font-family: inherit; font-size: 13.5px; font-weight: 700; text-align: center; text-decoration: underline; letter-spacing: .05em; margin: 14px 0; }
.doc-para { margin: 5px 0; text-align: justify; font-size: inherit; line-height: 1.7; }
.doc-meta { font-size: 12.5px; margin: 2px 0; }
.doc-section { font-weight: 700; font-size: 13px; letter-spacing: .05em; margin: 12px 0 4px 0; }
.doc-indent { margin: 6px 28px; }
.doc-field-row { display: flex; align-items: baseline; gap: 2px; margin: 3px 0; font-size: 13px; }
.doc-field-label { white-space: nowrap; font-weight: 700; font-size: 13px; }
.doc-field-line { flex: 1; border-bottom: 1px solid var(--ink); min-width: 40px; margin: 0 4px; height: 18px; outline: none; }
.doc-line-only { display: block; border-bottom: 1px solid var(--ink); width: 100%; height: 22px; margin: 5px 0; outline: none; }
.doc-hr { border: none; border-top: 1px solid var(--ink); margin: 8px 0; }
.doc-spacer-sm { height: 14px; display: block; }
.doc-spacer-md { height: 30px; display: block; }
.doc-spacer-lg { height: 60px; display: block; }
.doc-numlist { padding-left: 22px; margin: 5px 0; }
.doc-numlist li { margin: 3px 0; padding-left: 3px; }
.doc-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12.5px; }
.doc-table td, .doc-table th { border: 1px solid var(--ink); padding: 4px 8px; vertical-align: top; text-align: left; }
.doc-table th { font-weight: 700; background: rgba(0,0,0,.05); }
.doc-sig-block { display: inline-block; min-width: 180px; text-align: center; margin-top: 6px; }
.doc-sig-line { border-bottom: 1px solid var(--ink); width: 100%; height: 42px; display: block; margin-bottom: 2px; }
.doc-sig-label { font-size: 11.5px; text-align: center; display: block; }
.doc-stamp-wrap { display: block; text-align: right; margin-bottom: 4px; }
.doc-stamp-txt {
  display: inline-block; border: 3px solid; padding: 3px 10px;
  font-weight: 900; font-size: 20px; letter-spacing: .1em;
  font-family: 'Courier Prime', monospace; line-height: 1;
  opacity: .88; user-select: none;
}
.doc-stamp-txt.red { color: var(--stamp-red); border-color: var(--stamp-red); }
.doc-stamp-txt.blue { color: var(--stamp-blue); border-color: var(--stamp-blue); }
.doc-stamp-img { display: inline-block; opacity: .85; user-select: none; }
.doc-stamp-img img { max-width: 140px; max-height: 80px; display: block; }

/* Editable hover */
[contenteditable]:hover:not(#document) { outline: 1px dashed rgba(80,100,200,.35); border-radius: 2px; }
[contenteditable]:focus:not(#document) { outline: 1px solid rgba(80,100,200,.55); border-radius: 2px; }
#document *::selection { background: rgba(120,160,255,.3); }

/* Drop zone highlight */
#document.drag-over { background: #f0ecd8; }

/* ===================== TABLE MODAL ===================== */
#tbl-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 500;
  align-items: center; justify-content: center;
}
#tbl-modal.open { display: flex; }
#tbl-box {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; width: 320px;
}
#tbl-box h3 { font-size: 15px; margin-bottom: 16px; }
.tbl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.tbl-row label { width: 80px; font-size: 13px; color: var(--text-dim); }
.tbl-row input[type=number] {
  flex: 1; background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 10px; border-radius: var(--radius);
  font-size: 14px; font-family: var(--ui);
}
.tbl-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
.tbl-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

/* ===================== CONFIRM MODAL ===================== */
#confirm-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 600;
  align-items: center; justify-content: center;
}
#confirm-modal.open { display: flex; }
#confirm-box {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; width: 340px;
}
#confirm-box h3 { font-size: 15px; margin-bottom: 8px; }
#confirm-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ===================== STATUS ===================== */
#statusbar {
  height: 24px; background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 18px;
  font-size: 11px; color: var(--text-dimmer); flex-shrink: 0;
}
#statusbar b { color: var(--text-dim); }
#drag-hint {
  margin-left: auto; font-size: 11px; color: var(--text-dimmer);
  transition: color .2s;
}
#drag-hint.active { color: #7788ff; }

/* Scrollbar */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333344; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #44445a; }

/* Print */
@media print {
  body { background: #fff; overflow: visible; }
  #topbar, #fmt-bar, #sidebar, #statusbar { display: none; }
  #canvas-area { padding: 0; background: #fff; display: block; overflow: visible; }
  #page-wrapper::before { display: none; }
  #document { width: 100%; min-height: auto; box-shadow: none; padding: 15mm 20mm 20mm 20mm; }
  [contenteditable]:hover, [contenteditable]:focus { outline: none !important; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <span id="topbar-title">📄 Dokumenty Larpowe</span>
  <div class="tsep"></div>
  <button class="tbtn" onclick="confirmClear()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    Nowy
  </button>
  <div style="flex:1"></div>
  <button class="tbtn" onclick="exportPNG()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 5-5 5 5"/></svg>
    PNG
  </button>
  <button class="tbtn primary" onclick="exportPDF()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
    PDF
  </button>
</div>

<!-- FORMAT TOOLBAR -->
<div id="fmt-bar">
  <!-- Font name -->
  <select id="fmt-fontname" onchange="fmtFont(this.value)" title="Czcionka dokumentu">
    <option value="'Courier Prime', 'Courier New', monospace">Courier Prime (maszynopis)</option>
    <option value="'Special Elite', cursive">Special Elite (stara maszyna)</option>
    <option value="'IM Fell English', serif">IM Fell English (klasyk)</option>
    <option value="'UnifrakturMaguntia', cursive">Unifraktur (gotyk)</option>
    <!-- Deweloper: dodaj tutaj własne czcionki np:
    <option value="'MojaFontCzcionka', serif">Moja Czcionka</option>
    -->
  </select>

  <!-- Font size -->
  <select id="fmt-fontsize" onchange="fmtSize(this.value)" title="Rozmiar czcionki">
    <option value="10px">10</option>
    <option value="11px">11</option>
    <option value="12px">12</option>
    <option value="13px" selected>13</option>
    <option value="14px">14</option>
    <option value="15px">15</option>
    <option value="16px">16</option>
    <option value="18px">18</option>
    <option value="20px">20</option>
    <option value="24px">24</option>
    <option value="28px">28</option>
    <option value="32px">32</option>
  </select>

  <div class="fbtn-sep"></div>

  <!-- Bold / Italic / Underline -->
  <button class="fbtn" id="btn-bold" onclick="fmtExec('bold')" title="Pogrubienie (Ctrl+B)"><b>B</b></button>
  <button class="fbtn" id="btn-italic" onclick="fmtExec('italic')" title="Kursywa (Ctrl+I)"><i>I</i></button>
  <button class="fbtn" id="btn-underline" onclick="fmtExec('underline')" title="Podkreślenie (Ctrl+U)"><u>U</u></button>
  <button class="fbtn" id="btn-strike" onclick="fmtExec('strikeThrough')" title="Przekreślenie"><s>S</s></button>

  <div class="fbtn-sep"></div>

  <!-- Alignment -->
  <button class="fbtn" onclick="fmtExec('justifyLeft')" title="Wyrównaj do lewej">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect y="3" width="20" height="2"/><rect y="8" width="14" height="2"/><rect y="13" width="20" height="2"/><rect y="18" width="14" height="2"/></svg>
  </button>
  <button class="fbtn" onclick="fmtExec('justifyCenter')" title="Wyśrodkuj">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="3" width="20" height="2"/><rect x="5" y="8" width="14" height="2"/><rect x="2" y="13" width="20" height="2"/><rect x="5" y="18" width="14" height="2"/></svg>
  </button>
  <button class="fbtn" onclick="fmtExec('justifyRight')" title="Wyrównaj do prawej">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="3" width="20" height="2"/><rect x="10" y="8" width="14" height="2"/><rect x="4" y="13" width="20" height="2"/><rect x="10" y="18" width="14" height="2"/></svg>
  </button>
  <button class="fbtn" onclick="fmtExec('justifyFull')" title="Wyrównaj do obu stron">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="3" width="20" height="2"/><rect x="2" y="8" width="20" height="2"/><rect x="2" y="13" width="20" height="2"/><rect x="2" y="18" width="14" height="2"/></svg>
  </button>

  <div class="fbtn-sep"></div>

  <!-- Color -->
  <input type="color" id="fmt-color" value="#111111" onchange="fmtColor(this.value)" title="Kolor tekstu">

  <div class="fbtn-sep"></div>

  <!-- Clear formatting -->
  <button class="fbtn" onclick="fmtExec('removeFormat')" title="Usuń formatowanie">✕</button>
</div>

<!-- MAIN -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- TEMPLATES -->
    <div class="ss">
      <div class="ss-title">Szablony</div>
      <button class="tpl-btn active" onclick="loadTpl('blank',this)">
        <div class="tpl-thumb"><div class="tl w60"></div></div>
        <div class="tpl-info"><span class="tpl-name">Pusty</span><span class="tpl-desc">Od zera</span></div>
      </button>
      <button class="tpl-btn" onclick="loadTpl('pismo',this)">
        <div class="tpl-thumb"><div class="tl h3 w60"></div><div class="tl"></div><div class="tl w60"></div><div class="tl mt"></div><div class="tl"></div></div>
        <div class="tpl-info"><span class="tpl-name">Pismo</span><span class="tpl-desc">List urzędowy</span></div>
      </button>
      <button class="tpl-btn" onclick="loadTpl('raport',this)">
        <div class="tpl-thumb"><div class="tl h3"></div><div class="tl w60"></div><div class="tl mt"></div><div class="tl"></div><div class="tl"></div></div>
        <div class="tpl-info"><span class="tpl-name">Raport</span><span class="tpl-desc">Decyzja / protokół</span></div>
      </button>
      <button class="tpl-btn" onclick="loadTpl('karta',this)">
        <div class="tpl-thumb"><div class="tl h3 w60"></div><div class="tl mt"></div><div class="tl w60"></div><div class="tl w60"></div><div class="tl mt"></div><div class="tl w60"></div></div>
        <div class="tpl-info"><span class="tpl-name">Karta osoby</span><span class="tpl-desc">Dane personalne</span></div>
      </button>
      <button class="tpl-btn" onclick="loadTpl('wniosek',this)">
        <div class="tpl-thumb"><div class="tl h3"></div><div class="tl w60"></div><div class="tl mt"></div><div class="tl"></div><div class="tl"></div><div class="tl w60"></div></div>
        <div class="tpl-info"><span class="tpl-name">Wniosek</span><span class="tpl-desc">Podanie / prośba</span></div>
      </button>
    </div>

    <!-- ELEMENTS — DRAGGABLE -->
    <div class="ss">
      <div class="ss-title">Elementy — przeciągnij</div>
      <div id="tool-list">
        <!-- generated by JS -->
      </div>
    </div>

    <!-- STAMPS — DRAGGABLE -->
    <div class="ss">
      <div class="ss-title">Stemple — przeciągnij</div>
      <div id="stamp-list">

const MAX_UNDO = 80;
let undoStack = [];
let redoStack = [];
let undoLock = false;

function saveUndo() {
  if (undoLock) return;
  const doc = document.getElementById('document');
  const snap = doc.innerHTML;
  if (undoStack.length && undoStack[undoStack.length-1] === snap) return;
  undoStack.push(snap);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function doUndo() {
  if (undoStack.length < 2) return;
  const doc = document.getElementById('document');
  redoStack.push(undoStack.pop());
  const prev = undoStack[undoStack.length-1];
  undoLock = true;
  doc.innerHTML = prev;
  undoLock = false;
  updateStatus();
}

function doRedo() {
  if (!redoStack.length) return;
  const doc = document.getElementById('document');
  const next = redoStack.pop();
  undoStack.push(next);
  undoLock = true;
  doc.innerHTML = next;
  undoLock = false;
  updateStatus();
}

function init() {
  buildToolList();
  buildStampList();

function buildToolList() {
  const list = document.getElementById('tool-list');
  list.innerHTML = '';
  TOOLS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tool-item';
    el.draggable = true;
    el.dataset.toolId = t.id;
    el.innerHTML = `<span class="ti">${t.icon}</span>${t.label}`;
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('tool-id', t.id);
      e.dataTransfer.effectAllowed = 'copy';
      el.classList.add('dragging');
      document.getElementById('drag-hint').classList.add('active');
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.getElementById('drag-hint').classList.remove('active');
    });
    list.appendChild(el);
  });
}

function buildStampList() {
  const list = document.getElementById('stamp-list');
  list.innerHTML = '';

  // Text stamps
  TEXT_STAMPS.forEach(s => {
    appendStampItem(list, s.text, s.color, 'text');
  });

  // Asset stamps (image PNGs)
  ASSET_STAMPS.forEach(name => {
    appendStampItem(list, name, null, 'img', `assets/${name}.png`);
  });
}

function appendStampItem(list, text, color, type, src) {
  const el = document.createElement('div');
  el.className = 'stamp-item';
  el.draggable = true;
  el.dataset.stampType = type;
  el.dataset.stampText = text;
  el.dataset.stampColor = color || '';
  el.dataset.stampSrc = src || '';

  let preview = '';
  if (type === 'img') {
    preview = `<div class="stamp-preview img">🖼</div>`;
  } else {
    preview = `<div class="stamp-preview ${color}">${text}</div>`;
  }
  el.innerHTML = `${preview}<span style="font-size:11px">${type==='img'?text+'.png':text}</span>`;

  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('stamp-type', type);
    e.dataTransfer.setData('stamp-text', text);
    e.dataTransfer.setData('stamp-color', color || '');
    e.dataTransfer.setData('stamp-src', src || '');
    e.dataTransfer.effectAllowed = 'copy';
    el.classList.add('dragging');
    document.getElementById('drag-hint').classList.add('active');
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.getElementById('drag-hint').classList.remove('active');
  });
  list.appendChild(el);
}

// Custom text stamp
function addCustomStamp() {
  const text = prompt('Tekst stempla (np. DO RĄK WŁASNYCH):');
  if (!text) return;
  const colorOk = confirm('OK = czerwony stempel\nAnuluj = niebieski stempel');
  const color = colorOk ? 'red' : 'blue';
  TEXT_STAMPS.push({ text: text.toUpperCase(), color });
  buildStampList();
}

function loadTpl(name, btn, force) {
  const doc = document.getElementById('document');
  const notEmpty = doc.innerText.trim().length > 2;
  if (!force && notEmpty) {
    showConfirm('Załadować szablon?',
      'Dokument zawiera treść. Załadowanie szablonu zastąpi całą zawartość.',
      () => { applyTpl(name, btn); }
    );
    return;
  }
  applyTpl(name, btn);
}

function applyTpl(name, btn) {
  const doc = document.getElementById('document');
  saveUndo();
  doc.innerHTML = TEMPLATES[name] || TEMPLATES.blank;
  updateStatus();
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  doc.focus();
}

// =====================================================================
// DRAG & DROP INTO DOCUMENT
// =====================================================================
let dropIndicator = null;
let dropTarget = null; // element after which to insert

function onDocDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  document.getElementById('document').classList.add('drag-over');

  const doc = document.getElementById('document');
  const y = e.clientY;

  // Find the child element closest to cursor
  const children = Array.from(doc.children);
  let best = null, bestDist = Infinity, insertAfter = null;

  for (let i = 0; i < children.length; i++) {
    const child = children[i];
    const rect = child.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    const dist = Math.abs(y - midY);
    if (dist < bestDist) {
      bestDist = dist;
      best = child;
      insertAfter = y > midY ? child : (children[i-1] || null);
    }
  }

  // Show drop indicator
  removeDropIndicator();
  const indicator = document.createElement('div');
  indicator.className = 'drop-line';
  indicator.id = 'drop-indicator';

  if (!insertAfter) {
    doc.insertBefore(indicator, doc.firstChild);
  } else {
    insertAfter.after(indicator);
  }
  dropTarget = insertAfter;
}

function onDocDragLeave(e) {
  if (!document.getElementById('document').contains(e.relatedTarget)) {
    document.getElementById('document').classList.remove('drag-over');
    removeDropIndicator();
    dropTarget = null;
  }
}

function removeDropIndicator() {
  const old = document.getElementById('drop-indicator');
  if (old) old.remove();
}

function onDocDrop(e) {
  e.preventDefault();
  document.getElementById('document').classList.remove('drag-over');

  const toolId = e.dataTransfer.getData('tool-id');
  const stampType = e.dataTransfer.getData('stamp-type');

  saveUndo();

  if (toolId) {
    if (toolId === 'table') {
      // Show table modal, remember drop position
      pendingDropTarget = dropTarget;
      removeDropIndicator();
      openTblModal();
      return;
    }
    const tool = TOOLS.find(t => t.id === toolId);
    if (tool) insertHTMLAtDrop(tool.html, dropTarget);
  } else if (stampType) {
    const text = e.dataTransfer.getData('stamp-text');
    const color = e.dataTransfer.getData('stamp-color');
    const src = e.dataTransfer.getData('stamp-src');
    const html = buildStampHTML(stampType, text, color, src);
    insertHTMLAtDrop(html, dropTarget);
  }

  removeDropIndicator();
  dropTarget = null;
  updateStatus();
}

function insertHTMLAtDrop(html, afterEl) {
  const doc = document.getElementById('document');
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const frag = document.createDocumentFragment();
  while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);

  if (!afterEl) {
    doc.insertBefore(frag, doc.firstChild);
  } else if (doc.contains(afterEl)) {
    afterEl.after(frag);
  } else {
    doc.appendChild(frag);
  }
}

function buildStampHTML(type, text, color, src) {
  const rot = (Math.random() * 18 - 9).toFixed(1); // -9° to +9°
  const tx = (Math.random() * 20 - 10).toFixed(0); // ±10px
  const ty = (Math.random() * 10 - 5).toFixed(0);  // ±5px
  const transform = `rotate(${rot}deg) translate(${tx}px,${ty}px)`;

  if (type === 'img') {
    return `<div class="doc-stamp-wrap"><div class="doc-stamp-img" style="transform:${transform};display:inline-block"><img src="${src}" alt="${text}"></div></div>`;
  } else {
    return `<div class="doc-stamp-wrap"><span class="doc-stamp-txt ${color}" contenteditable="false" style="transform:${transform};display:inline-block">${text}</span></div>`;
  }
}

// =====================================================================
// TABLE MODAL
// =====================================================================
let pendingDropTarget = null;

function openTblModal() {
  document.getElementById('tbl-modal').classList.add('open');
}
function closeTblModal() {
  document.getElementById('tbl-modal').classList.remove('open');
  pendingDropTarget = null;
}
function confirmTable() {
  const cols = Math.max(1, Math.min(10, parseInt(document.getElementById('tbl-cols').value) || 3));
  const rows = Math.max(1, Math.min(20, parseInt(document.getElementById('tbl-rows').value) || 3));
  const header = document.getElementById('tbl-header').checked;

  let html = `<table class="doc-table">`;
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      if (r === 0 && header) {
        html += `<th contenteditable="true">Kolumna ${c+1}</th>`;
      } else {
        html += `<td contenteditable="true">${r===0&&!header?`Kolumna ${c+1}`:''}</td>`;
      }
    }
    html += '</tr>';
  }
  html += `</table>`;

  insertHTMLAtDrop(html, pendingDropTarget);
  closeTblModal();
  updateStatus();
}

// Close table modal on overlay click
document.getElementById('tbl-modal').addEventListener('click', function(e) {
  if (e.target === this) closeTblModal();
});

  document.getElementById('cm-title').textContent = title;

  confirmCallback = cb;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
  confirmCallback = null;
}
document.getElementById('cm-ok').onclick = function() {
  closeConfirm();
  if (confirmCallback) confirmCallback();
};
document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
function confirmClear() {
  showConfirm('Nowy dokument', 'Czy na pewno chcesz wyczyścić cały dokument? Tej operacji nie można cofnąć.', () => {
    applyTpl('blank', document.querySelector('.tpl-btn'));
    document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tpl-btn')[0].classList.add('active');
  });
}

// =====================================================================
// FORMAT TOOLBAR
// =====================================================================
function fmtExec(cmd, val) {
  document.getElementById('document').focus();
  document.execCommand(cmd, false, val || null);
  updateFmtState();
}
function fmtFont(val) {
  document.getElementById('document').style.fontFamily = val;
}
function fmtSize(val) {
  document.getElementById('document').style.fontSize = val;
}
function fmtColor(val) {
  document.execCommand('foreColor', false, val);
}

function updateFmtState() {
  document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
  document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));
  document.getElementById('btn-underline').classList.toggle('active', document.queryCommandState('underline'));
  document.getElementById('btn-strike').classList.toggle('active', document.queryCommandState('strikeThrough'));
}

// =====================================================================
// STATUS BAR
// =====================================================================
function updateStatus() {
  const doc = document.getElementById('document');
  const text = doc.innerText || '';
  document.getElementById('stat-chars').textContent = text.length;
  document.getElementById('stat-words').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
}

// =====================================================================
// KEYBOARD SHORTCUTS
// =====================================================================
document.addEventListener('keydown', function(e) {
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if (mod && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
  if (mod && e.key === 'p') { e.preventDefault(); exportPDF(); }
  if (e.key === 'Escape') { closeTblModal(); closeConfirm(); }
});

// Track changes in document for undo
let undoTimer = null;
document.getElementById('document').addEventListener('input', function() {
  clearTimeout(undoTimer);
  undoTimer = setTimeout(saveUndo, 600);
  updateStatus();
});

// =====================================================================
// EXPORT PNG
// =====================================================================
async function exportPNG() {
  const btn = document.querySelector('.tbtn:not(.primary)');
  const orig = btn.innerHTML;
  btn.textContent = '⏳...';
  btn.disabled = true;
  const doc = document.getElementById('document');
  try {
    const canvas = await html2canvas(doc, {
      scale: 2, useCORS: true, backgroundColor: '#f4efe5',
      logging: false, width: doc.offsetWidth, height: doc.offsetHeight,
    });
    const a = document.createElement('a');
    a.download = 'dokument-larp.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) { alert('Błąd eksportu PNG: ' + e.message); }
  finally { btn.innerHTML = orig; btn.disabled = false; }
}

// =====================================================================
// EXPORT PDF
// =====================================================================
async function exportPDF() {
  const btn = document.querySelector('.tbtn.primary');
  const orig = btn.innerHTML;
  btn.textContent = '⏳...';
  btn.disabled = true;
  const doc = document.getElementById('document');
  try {
    const canvas = await html2canvas(doc, {
      scale: 2, useCORS: true, backgroundColor: '#f4efe5',
      logging: false, width: doc.offsetWidth, height: doc.offsetHeight,
    });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pW = pdf.internal.pageSize.getWidth();
    const pH = pdf.internal.pageSize.getHeight();
    const imgRatio = canvas.width / canvas.height;
    let drawW = pW, drawH = pW / imgRatio;
    if (drawH > pH) { drawH = pH; drawW = pH * imgRatio; }
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', (pW-drawW)/2, 0, drawW, drawH);
    pdf.save('dokument-larp.pdf');
  } catch(e) { alert('Błąd eksportu PDF: ' + e.message); }
  finally { btn.innerHTML = orig; btn.disabled = false; }
}

// =====================================================================
// START
// =====================================================================
init();
</script>
